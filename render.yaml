services:
  - type: web
    name: mlinsights-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        sync: false
      - key: UPLOAD_DIR
        value: /tmp/mlinsights_uploads
      - key: PYTHON_VERSION
        value: "3.11.9"
